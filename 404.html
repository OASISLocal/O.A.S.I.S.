<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — O.A.S.I.S.</title>
    <meta name="robots" content="noindex">
    <link rel="canonical" href="https://oasislocal.github.io/O.A.S.I.S./">
    <link rel="icon" type="image/png" href="/O.A.S.I.S./assets/logo-icon-64x64.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0b;
            color: #e4e4e7;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
        }
        .status {
            font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', monospace;
            font-size: 6rem;
            font-weight: 700;
            color: #10b981;
            line-height: 1;
            margin-bottom: 0.5rem;
        }
        .status-dot {
            display: inline-block;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #10b981;
            margin-right: 12px;
            vertical-align: middle;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 500;
            color: #a1a1aa;
            margin-bottom: 1.5rem;
        }
        p {
            color: #71717a;
            max-width: 360px;
            line-height: 1.6;
            font-size: 0.9375rem;
            margin-bottom: 2rem;
        }
        a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #10b981;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9375rem;
            padding: 10px 24px;
            border: 1px solid #10b981;
            border-radius: 8px;
            transition: all 0.2s;
        }
        a:hover {
            background: #10b981;
            color: #0a0a0b;
        }
    </style>
</head>
<body>
    <div class="status">
        <span class="status-dot"></span>404
    </div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a href="/O.A.S.I.S./">&larr; Back to O.A.S.I.S.</a>
</body>
</html>
